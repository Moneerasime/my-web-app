{% extends "layout.html" %}
{% block content %}

<div class="register-card">

<h2>استعادة كلمة المرور</h2>

<form action="{{ url_for('auth.reset_password') }}" method="post">

<input type="email" name="email" placeholder="أدخل البريد الإلكتروني" required>

<input type="password" name="new_password" placeholder="كلمة المرور الجديدة" required>

<button type="submit">تغيير كلمة المرور</button>

</form>

<div class="links" style="text-align: center; margin-top: 20px;">
    <a href="{{ previous_page }}">← العودة إلى الصفحة السابقة</a>
</div>

</div>

{% endblock %}
